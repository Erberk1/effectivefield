<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <!-- Feynman triangle diagram: fermion loop + 3 photon propagators converging at centroid -->
  <!-- No background — fully transparent -->

  <g fill="none" stroke="#d8d4c8" stroke-linecap="round" stroke-linejoin="round">

    <!-- Equilateral triangle vertices:
         Top:    (80, 18)
         Left:   (24, 115)
         Right:  (136, 115)
         Centroid: (80, 82.7)
    -->

    <!-- Fermion loop — bold triangle -->
    <line x1="24" y1="115" x2="80" y2="18" stroke-width="2.8"/>
    <line x1="80" y1="18" x2="136" y2="115" stroke-width="2.8"/>
    <line x1="136" y1="115" x2="24" y2="115" stroke-width="2.8"/>

    <!-- Arrows on fermion lines -->
    <!-- Left edge: bottom-left → top, arrow at ~38% -->
    <polygon points="47,78 58,62 42.5,66" fill="#d8d4c8" stroke="none"/>
    <!-- Right edge: top → bottom-right, arrow at ~38% -->
    <polygon points="102,62 113,78 117.5,66" fill="#d8d4c8" stroke="none"/>
    <!-- Bottom edge: right → left, arrow at midpoint -->
    <polygon points="87,110.5 73,110.5 80,120" fill="#d8d4c8" stroke="none"/>

    <!-- Photon (wavy) propagators — from each vertex inward to centroid (80, 82.7) -->

    <!-- Top vertex (80,18) → centroid (80,82.7): vertical sinusoidal -->
    <path d="M 80,18
             C 73,25.5 73,33 80,40.5
             C 87,48 87,55.5 80,63
             C 73,70.5 73,76 80,82.7"
          stroke-width="2.2"/>

    <!-- Bottom-left vertex (24,115) → centroid (80,82.7): angled sinusoidal -->
    <path d="M 24,115
             C 31,109 37.5,111.5 41,116.5
             C 44.5,121.5 51,122.5 57,117
             C 63,111.5 68.5,113 80,82.7"
          stroke-width="2.2"/>

    <!-- Bottom-right vertex (136,115) → centroid (80,82.7): angled sinusoidal -->
    <path d="M 136,115
             C 129,109 122.5,111.5 119,116.5
             C 115.5,121.5 109,122.5 103,117
             C 97,111.5 91.5,113 80,82.7"
          stroke-width="2.2"/>

    <!-- Small dot at centroid where photons meet -->
    <circle cx="80" cy="82.7" r="3" fill="#d8d4c8" stroke="none"/>
  </g>
</svg>
