<canvas id="ripple-canvas" aria-hidden="true"></canvas>

<script>
(function() {
  const canvas = document.getElementById('ripple-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, dpr = Math.min(window.devicePixelRatio || 1, 1.5);
  const ripples = [];
  const particles = [];
  let lastSpawn = 0;
  let lastMouseSpawn = 0;
  let frameCount = 0;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // Theme-adaptive colors — cached, only recalculated on theme change
  var _cachedColors = null;
  var _cachedTheme = null;
  function getColors() {
    var theme = document.documentElement.dataset.theme || 'light';
    if (theme === _cachedTheme && _cachedColors) return _cachedColors;
    _cachedTheme = theme;
    _cachedColors = theme === 'dark' ? {
      wave: [80, 130, 180],
      waveInner: [100, 150, 200],
      waveGlow: [60, 110, 160],
      particle: [120, 200, 190],
      particleGlow: [100, 180, 170]
    } : {
      wave: [40, 70, 140],
      waveInner: [60, 90, 160],
      waveGlow: [30, 60, 130],
      particle: [20, 130, 120],
      particleGlow: [15, 110, 100]
    };
    return _cachedColors;
  }

  function spawnRipple(x, y, opts) {
    opts = opts || {};
    ripples.push({
      x: x,
      y: y,
      radius: 0,
      maxRadius: opts.maxRadius || (140 + Math.random() * 200),
      speed: opts.speed || (0.5 + Math.random() * 0.4),
      width: opts.width || (1.0 + Math.random() * 0.8),
      opacity: opts.opacity || 0.45,
      born: performance.now()
    });
  }

  function spawnParticle(x, y) {
    particles.push({
      x: x,
      y: y,
      vx: (Math.random() - 0.5) * 0.6,
      vy: (Math.random() - 0.5) * 0.6,
      life: 1.0,
      decay: 0.006 + Math.random() * 0.008,
      size: 1.5 + Math.random() * 2.5
    });
  }

  // Ambient ripples — always multiple visible
  function ambientSpawn(now) {
    if (now - lastSpawn > 900 + Math.random() * 900) {
      lastSpawn = now;
      spawnRipple(
        Math.random() * W,
        Math.random() * H,
        { maxRadius: 180 + Math.random() * 260, opacity: 0.38, speed: 0.4 + Math.random() * 0.3 }
      );
    }
  }

  // Seed initial ripples
  function seedRipples() {
    for (var i = 0; i < 6; i++) {
      spawnRipple(
        Math.random() * W,
        Math.random() * H,
        { maxRadius: 180 + Math.random() * 260, opacity: 0.35, speed: 0.35 + Math.random() * 0.35 }
      );
      ripples[ripples.length - 1].radius = Math.random() * ripples[ripples.length - 1].maxRadius * 0.7;
    }
  }
  seedRipples();

  // Mouse-driven ripples
  window.addEventListener('mousemove', function(e) {
    var now = performance.now();
    if (now - lastMouseSpawn > 200) {
      lastMouseSpawn = now;
      spawnRipple(e.clientX, e.clientY, {
        maxRadius: 90 + Math.random() * 80,
        speed: 0.8 + Math.random() * 0.3,
        width: 1.2,
        opacity: 0.5
      });
    }
  });

  // Touch support
  window.addEventListener('touchmove', function(e) {
    var touch = e.touches[0];
    var now = performance.now();
    if (now - lastMouseSpawn > 100) {
      lastMouseSpawn = now;
      spawnRipple(touch.clientX, touch.clientY, {
        maxRadius: 100 + Math.random() * 80,
        speed: 0.9,
        width: 1.4,
        opacity: 0.55
      });
    }
  }, { passive: true });

  // Click/tap splash
  window.addEventListener('click', function(e) {
    if (e.target.closest('a, button, input, textarea, select, [role="button"]')) return;
    spawnRipple(e.clientX, e.clientY, {
      maxRadius: 300, speed: 1.5, width: 2.0, opacity: 0.6
    });
    spawnRipple(e.clientX, e.clientY, {
      maxRadius: 200, speed: 1.0, width: 1.4, opacity: 0.45
    });
    for (var i = 0; i < 12; i++) {
      spawnParticle(e.clientX + (Math.random() - 0.5) * 20, e.clientY + (Math.random() - 0.5) * 20);
    }
  });

  // Interference particle spawning
  function checkInterference() {
    for (var i = 0; i < ripples.length; i++) {
      for (var j = i + 1; j < ripples.length; j++) {
        var r1 = ripples[i], r2 = ripples[j];
        var dx = r2.x - r1.x, dy = r2.y - r1.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var sumR = r1.radius + r2.radius;
        var diffR = Math.abs(r1.radius - r2.radius);

        if (dist < sumR && dist > diffR && dist > 0) {
          var t1 = r1.radius / r1.maxRadius;
          var t2 = r2.radius / r2.maxRadius;
          if (t1 > 0.1 && t1 < 0.85 && t2 > 0.1 && t2 < 0.85) {
            if (Math.random() < 0.04) {
              var a = (r1.radius * r1.radius - r2.radius * r2.radius + dist * dist) / (2 * dist);
              var h = Math.sqrt(Math.max(0, r1.radius * r1.radius - a * a));
              var px = r1.x + a * (dx / dist);
              var py = r1.y + a * (dy / dist);
              spawnParticle(px + h * (-dy / dist), py + h * (dx / dist));
              if (Math.random() < 0.5) {
                spawnParticle(px - h * (-dy / dist), py - h * (dx / dist));
              }
            }
          }
        }
      }
    }
  }

  function frame(now) {
    frameCount++;
    ambientSpawn(now);
    ctx.clearRect(0, 0, W, H);
    var c = getColors();

    // Draw ripples
    for (var i = ripples.length - 1; i >= 0; i--) {
      var r = ripples[i];
      r.radius += r.speed;
      var t = r.radius / r.maxRadius;
      if (t >= 1) { ripples.splice(i, 1); continue; }
      var fadeIn = Math.min(1, t * 5);
      var fadeOut = 1 - t;
      var alpha = r.opacity * fadeIn * fadeOut;

      ctx.beginPath();
      ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(' + c.wave.join(',') + ',' + alpha + ')';
      ctx.lineWidth = r.width;
      ctx.stroke();

      if (r.radius > 12) {
        ctx.beginPath();
        ctx.arc(r.x, r.y, r.radius - 7, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(' + c.waveInner.join(',') + ',' + (alpha * 0.45) + ')';
        ctx.lineWidth = r.width * 0.5;
        ctx.stroke();
      }

      if (r.radius > 20 && alpha > 0.15) {
        ctx.beginPath();
        ctx.arc(r.x, r.y, r.radius + 4, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(' + c.waveGlow.join(',') + ',' + (alpha * 0.2) + ')';
        ctx.lineWidth = r.width * 2.5;
        ctx.stroke();
      }
    }

    // Only run O(n²) interference check every 4th frame
    if (frameCount % 4 === 0) checkInterference();

    // Draw particles
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      var pa = p.life * 0.7;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + c.particle.join(',') + ',' + pa + ')';
      ctx.fill();

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size + 2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + c.particleGlow.join(',') + ',' + (pa * 0.25) + ')';
      ctx.fill();
    }

    if (ripples.length > 40) ripples.splice(0, ripples.length - 40);
    if (particles.length > 80) particles.splice(0, particles.length - 80);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
