baseURL = "https://effectivefield.com/"
title = "Effective Field"
paginate = 10
theme = "PaperMod"
locale = "en-us"

[params]
  description = "Physics, technology, and ideas — by Eren Erberk Erkul."
  author = "Eren Erberk Erkul"
  keywords = ["science", "physics", "technology", "blog"]
  DateFormat = "January 2, 2006"
  defaultTheme = "light"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  math = true
  hideSummary = false
  disableSpecial1stPost = true

  [params.cover]
    hidden = true
    hiddenInList = true
    hiddenInSingle = false

  [params.label]
    text = "Effective Field"
    icon = "/images/logo.png"
    iconHeight = 48

  [params.homeInfoParams]
    Title = "Effective Field"
    Content = "Physics, technology, and ideas — by Eren Erberk Erkul"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/erenerberkerkul"
  [[params.socialIcons]]
    name = "youtube"
    url = "https://www.youtube.com/@erenerberkerkul"
  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 3
  [[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "/contact/"
    weight = 4
  [[menu.main]]
    identifier = "simulations"
    name = "Simulations"
    url = "/simulations/"
    weight = 5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github"
    lineNos = false
    codeFences = true
